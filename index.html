<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Chess</title>
    <style>
        body { margin: 0; background: #1c1c1c; color: #e1e1e1; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .board-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2vmin; position: relative; }
        .material-badge { background: #333; color: white; padding: 4px 10px; border-radius: 4px; font-weight: bold; margin: 10px 0; font-size: 1.1rem; display: flex; justify-content: center; width: 100%; max-width: 80vh; }
        .mat-white { color: #f0d9b5; }
        .mat-black { color: #888; }
        
        #board-container { width: 100%; height: 100%; max-height: 80vh; max-width: 80vh; display:flex; justify-content:center; }
        #board-container svg { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0px 10px 30px rgba(0,0,0,0.6)); }
        
        #sidebar { width: 350px; background: #242424; display: flex; flex-direction: column; border-left: 1px solid #333; z-index: 10; }
        .controls-bar { padding: 15px; background: #111; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #333; }
        button, input, select { background: #2a5c8a; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
        button:hover { background: #3b76ad; }
        .btn-danger { background: #c53030; } .btn-danger:hover { background: #9b2c2c; }
        .btn-outline { background: transparent; border: 1px solid #555; } .btn-outline:hover { background: #333; }
        
        #moves-container { flex: 1; padding: 15px 20px; overflow-y: auto; font-size: 1.15rem; line-height: 2; }
        .turn-number { color: #666; font-size: 0.85em; margin-right: 5px; }
        .move-span { cursor: pointer; padding: 3px 6px; border-radius: 4px; transition: background 0.1s; }
        .move-span:hover { background: #444; }
        .move-active { background: #2a5c8a !important; color: white; }

        /* Full Screen Modals */
        #modal-overlay, #edit-player-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
        #edit-player-overlay { z-index: 200; }
        .modal-content { background: #242424; width: 90%; max-width: 900px; height: 80vh; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #444; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .mini-modal { width: 350px; height: auto; padding: 20px; border-radius: 8px; background: #1c1c1c; border: 1px solid #444;}
        .modal-header { padding: 15px 20px; background: #111; display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        .tabs button { flex: 1; border-radius: 0; background: #333; } .tabs button.active { background: #2a5c8a; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { background: #111; color: #888; position: sticky; top: 0; }
        tr:hover { background: #333; }
        .action-icons span { cursor: pointer; margin-right: 10px; font-size: 1.2rem; }

        /* Engine Analysis UI */
        #eval-container { width: 30px; background: #333; display: none; flex-direction: column; justify-content: flex-end; margin: 2vmin 0 2vmin 2vmin; border-radius: 4px; overflow: hidden; position: relative; }
        #eval-fill { width: 100%; background: #f0d9b5; height: 50%; transition: height 0.5s ease-in-out; }
        #engine-readout { display: none; padding: 10px; background: #1a365d; font-size: 0.9rem; border-bottom: 1px solid #333; }
        .best-move { color: #63b3ed; font-weight: bold; font-size: 1.1rem; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            #eval-container { display: none !important; }
            #sidebar { width: 100%; border-left: none; border-top: 2px solid #111; }
            #moves-container { max-height: 40vh; }
        }
    </style>
</head>
<body>
    <div id="eval-container"><div id="eval-fill"></div></div>

    <div class="board-area">
        <div id="mat-top" class="material-badge"></div>
        <div id="board-container"></div>
        <div id="mat-bot" class="material-badge"></div>
    </div>
    
    <div id="sidebar">
        <div class="controls-bar">
            <button onclick="openManager()" style="background: #e2e8f0; color: #1a202c; font-weight: bold;">🏆 Game Manager & Analytics</button>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 10px; gap: 5px;">
                <span id="current-game-label" style="color:#a0aec0; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;">Viewing: live.pgn</span>
                <button class="btn-outline" onclick="toggleFlip()">Flip 🔃</button>
                <button id="mode-toggle-btn" class="btn-outline"></button>
            </div>
        </div>

        <div id="engine-readout">
            <div>Eval: <span id="engine-eval">--</span></div>
            <div>Best: <span id="engine-best" class="best-move">--</span></div>
        </div>

        <div id="moves-container">Loading...</div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="tabs" style="display:flex; gap:5px; flex:1;">
                    <button id="tab-games" class="active" onclick="switchTab('games')">📚 Archive</button>
                    <button id="tab-leader" onclick="switchTab('leader')">🏅 Leaderboard</button>
                    <button id="tab-matrix" onclick="switchTab('matrix')">🧮 Head-to-Head</button>
                </div>
                <button class="btn-danger" onclick="closeManager()" style="flex:0;">Close</button>
            </div>
            <div class="modal-body" id="modal-body-content"></div>
        </div>
    </div>

    <div id="edit-player-overlay">
        <div class="mini-modal">
            <h3 style="margin-top:0;">Edit Players</h3>
            <div style="margin-bottom: 10px;">
                <label>White Player:</label>
                <input id="edit-w-input" list="known-players" style="width:100%; box-sizing:border-box; margin-top:5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Black Player:</label>
                <input id="edit-b-input" list="known-players" style="width:100%; box-sizing:border-box; margin-top:5px;">
            </div>
            <div style="display:flex; gap:10px;">
                <button style="flex:1;" onclick="submitPlayerEdit()">Save</button>
                <button class="btn-danger" style="flex:1;" onclick="closePlayerEdit()">Cancel</button>
            </div>
            <input type="hidden" id="edit-target-file">
            <datalist id="known-players"></datalist>
        </div>
    </div>

    <script>
        const IS_ANALYSIS = window.location.pathname === '/analysis';
        let totalPlies = 0, currentViewPly = -1, lastMovesData = [];
        let isFlipped = false, currentGameFile = 'live.pgn', currentBestMove = null;

        // UI Setup
        document.getElementById('mode-toggle-btn').innerText = IS_ANALYSIS ? 'Live View' : 'Analyze Engine';
        document.getElementById('mode-toggle-btn').onclick = () => window.location.href = IS_ANALYSIS ? '/' : '/analysis';
        if (IS_ANALYSIS) {
            document.getElementById('eval-container').style.display = 'flex';
            document.getElementById('engine-readout').style.display = 'block';
        }

        function toggleFlip() { isFlipped = !isFlipped; updateBoard(); renderMaterial(); }

        function loadGame(filename) {
            currentGameFile = filename;
            document.getElementById('current-game-label').innerText = `Viewing: ${filename}`;
            totalPlies = 0; currentViewPly = -1; currentBestMove = null;
            closeManager(); updateBoard(); fetchState();
        }

        function viewPly(ply) {
            currentViewPly = ply; currentBestMove = null;
            updateBoard(); renderMovesList(); renderMaterial();
            if (IS_ANALYSIS) {
                let moveObj = lastMovesData.find(m => m.ply === ply);
                if (moveObj) analyzePosition(moveObj.fen);
            }
        }

        function updateBoard() {
            const target = (currentViewPly === -1) ? '' : `&ply=${currentViewPly}`;
            const bm = (IS_ANALYSIS && currentBestMove) ? `&bestmove=${encodeURIComponent(currentBestMove)}` : '';
            fetch(`/board.svg?file=${currentGameFile}${target}&flipped=${isFlipped}${bm}&t=${Date.now()}`)
                .then(r => r.text()).then(svg => document.getElementById('board-container').innerHTML = svg);
        }

        function renderMaterial() {
            if (lastMovesData.length === 0) return;
            let activePly = (currentViewPly === -1) ? totalPlies : currentViewPly;
            let moveObj = lastMovesData.find(m => m.ply === activePly) || lastMovesData[lastMovesData.length-1];
            
            let diff = moveObj.material;
            let wText = diff > 0 ? `+${diff}` : ''; let bText = diff < 0 ? `+${Math.abs(diff)}` : '';
            const top = document.getElementById('mat-top'), bot = document.getElementById('mat-bot');

            if (isFlipped) {
                top.innerText = wText; top.className = "material-badge mat-white";
                bot.innerText = bText; bot.className = "material-badge mat-black";
            } else {
                top.innerText = bText; top.className = "material-badge mat-black";
                bot.innerText = wText; bot.className = "material-badge mat-white";
            }
        }

        function renderMovesList() {
            if (lastMovesData.length === 0) return;
            let html = '', activePly = (currentViewPly === -1) ? totalPlies : currentViewPly;
            for(let i = 1; i < lastMovesData.length; i += 2) {
                let turn = Math.floor(i / 2) + 1, white = lastMovesData[i], black = lastMovesData[i+1];
                html += `<div><span class="turn-number">${turn}.</span>`;
                let wClass = (white.ply === activePly) ? 'move-active' : '';
                html += `<span class="move-span ${wClass}" onclick="viewPly(${white.ply})">${white.san}</span> `;
                if (black) {
                    let bClass = (black.ply === activePly) ? 'move-active' : '';
                    html += `<span class="move-span ${bClass}" onclick="viewPly(${black.ply})">${black.san}</span>`;
                }
                html += `</div>`;
            }
            document.getElementById('moves-container').innerHTML = html;
        }

        function analyzePosition(fen) {
            if (!fen) return;
            document.getElementById('engine-eval').innerText = "Calc...";
            fetch("https://chess-api.com/v1", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ fen: fen, depth: 10 }) })
            .then(r => r.json()).then(data => {
                let score = data.mate ? (data.mate > 0 ? 10 : -10) : (data.eval / 100);
                document.getElementById('engine-eval').innerText = data.mate ? `M${data.mate}` : (score > 0 ? `+${score.toFixed(2)}` : score.toFixed(2));
                document.getElementById('engine-best').innerText = data.san;
                
                // Trigger an arrow render
                currentBestMove = data.san;
                updateBoard();
                
                let pct = Math.max(0, Math.min(100, 50 + (score * 10)));
                let fill = document.getElementById('eval-fill'), container = document.getElementById('eval-container');
                if (isFlipped) { fill.style.height = `${100 - pct}%`; fill.style.background = '#333'; container.style.background = '#f0d9b5'; } 
                else { fill.style.height = `${pct}%`; fill.style.background = '#f0d9b5'; container.style.background = '#333'; }
            });
        }

        function fetchState() {
            fetch(`/game-data?file=${currentGameFile}&t=${Date.now()}`)
                .then(r => r.json()).then(data => {
                    if (!data || data.total_plies === undefined) return;
                    if (data.total_plies !== totalPlies) {
                        totalPlies = data.total_plies; lastMovesData = data.moves;
                        if (currentViewPly === -1) {
                            currentBestMove = null;
                            updateBoard(); renderMovesList(); renderMaterial();
                            const c = document.getElementById('moves-container'); c.scrollTop = c.scrollHeight;
                            if (IS_ANALYSIS && lastMovesData.length > 0) analyzePosition(lastMovesData[lastMovesData.length - 1].fen);
                        } else renderMovesList();
                    }
                }).catch(()=>{});
        }

        // --- Manager UI & Analytics ---
        function openManager() { 
            document.getElementById('modal-overlay').style.display = 'flex'; 
            fetch('/api/games').then(r=>r.json()).then(games => {
                window.allGames = games; // Cache globally for tabs to process
                updateDatalist();
                switchTab('games');
            });
        }
        function closeManager() { document.getElementById('modal-overlay').style.display = 'none'; }
        
        function updateDatalist() {
            let pSet = new Set();
            window.allGames.forEach(g => { pSet.add(g.white); pSet.add(g.black); });
            let dl = document.getElementById('known-players'); dl.innerHTML = '';
            Array.from(pSet).sort().forEach(p => { if (p !== 'Unknown') dl.innerHTML += `<option value="${p}">`; });
        }

        function switchTab(tab) {
            ['games', 'leader', 'matrix'].forEach(t => document.getElementById(`tab-${t}`).classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            const body = document.getElementById('modal-body-content'); body.innerHTML = "<h2>Loading...</h2>";
            
            if (tab === 'games') {
                let html = `<table><tr><th>File</th><th>White</th><th>Black</th><th>Result</th><th>Notes</th><th>Actions</th></tr>`;
                window.allGames.forEach(g => {
                    let fav = g.is_favorite ? '⭐' : '☆', notes = '';
                    if (g.is_checkmate) notes += '<span style="color:#48bb78" title="Checkmate">#️⃣</span> ';
                    if (g.is_empty) notes += '<span style="color:#e53e3e" title="Empty Game">∅</span>';
                    html += `<tr><td style="cursor:pointer; color:#63b3ed;" onclick="loadGame('${g.filename}')">${g.filename}</td>
                        <td>${g.white}</td><td>${g.black}</td><td>${g.result}</td><td>${notes}</td>
                        <td class="action-icons">
                            <span onclick="apiAction('favorite', '${g.filename}')">${fav}</span>
                            <span onclick="openPlayerEdit('${g.filename}', '${g.white}', '${g.black}')">✏️</span>
                            <span onclick="apiAction('rename', '${g.filename}')">🏷️</span>
                            <span onclick="apiAction('delete', '${g.filename}')" style="color:red;">❌</span>
                        </td></tr>`;
                });
                body.innerHTML = html + "</table>";
            } else if (tab === 'leader') {
                body.innerHTML = `<div style="display:flex; gap:10px; margin-bottom: 20px;">
                    <button class="btn-outline" onclick="renderLeaderboard(9999)">All Time</button>
                    <button class="btn-outline" onclick="renderLeaderboard(14)">Last 14 Days</button>
                    <button class="btn-outline" onclick="renderLeaderboard(1)">Last 24 Hours</button>
                </div><div id="analytics-table"></div>`;
                renderLeaderboard(9999);
            } else if (tab === 'matrix') {
                renderMatrix();
            }
        }

        function renderLeaderboard(days) {
            const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
            let stats = {};
            
            window.allGames.forEach(g => {
                if (g.is_empty || g.result === '*') return;
                let date = new Date(g.date_played.replace(/\./g, '-'));
                if (days < 9999 && date < cutoff) return;
                
                if(!stats[g.white]) stats[g.white] = {pts:0, w:0, l:0, d:0};
                if(!stats[g.black]) stats[g.black] = {pts:0, w:0, l:0, d:0};
                
                // Standard Points: Win=1, Draw=0.5
                if (g.result === '1-0') { stats[g.white].pts += 1; stats[g.white].w += 1; stats[g.black].l += 1; } 
                else if (g.result === '0-1') { stats[g.black].pts += 1; stats[g.black].w += 1; stats[g.white].l += 1; } 
                else if (g.result === '1/2-1/2') { stats[g.white].pts += 0.5; stats[g.white].d += 1; stats[g.black].pts += 0.5; stats[g.black].d += 1; }
            });

            let sorted = Object.keys(stats).map(p => ({name: p, ...stats[p]})).sort((a,b) => b.pts - a.pts);
            let html = `<table><tr><th>Rank</th><th>Player</th><th>Points</th><th>Record (W-L-D)</th></tr>`;
            sorted.forEach((p, i) => { html += `<tr><td>#${i+1}</td><td>${p.name}</td><td style="color:#f6e05e; font-weight:bold;">${p.pts}</td><td><span style="color:#48bb78">${p.w}</span>-<span style="color:#f56565">${p.l}</span>-<span style="color:#a0aec0">${p.d}</span></td></tr>`; });
            document.getElementById('analytics-table').innerHTML = html + "</table>";
        }

        function renderMatrix() {
            let matrix = {}, players = new Set();
            window.allGames.forEach(g => {
                if (g.is_empty || g.result === '*') return;
                players.add(g.white); players.add(g.black);
                if(!matrix[g.white]) matrix[g.white] = {}; if(!matrix[g.black]) matrix[g.black] = {};
                if(!matrix[g.white][g.black]) matrix[g.white][g.black] = {w:0, l:0, d:0};
                if(!matrix[g.black][g.white]) matrix[g.black][g.white] = {w:0, l:0, d:0};
                
                if(g.result === '1-0') { matrix[g.white][g.black].w++; matrix[g.black][g.white].l++; } 
                else if (g.result === '0-1') { matrix[g.white][g.black].l++; matrix[g.black][g.white].w++; } 
                else if (g.result === '1/2-1/2') { matrix[g.white][g.black].d++; matrix[g.black][g.white].d++; }
            });
            
            let pArr = Array.from(players).sort();
            let html = `<div style="overflow-x:auto;"><table><tr><th>Matchups (W-L-D)</th>`;
            pArr.forEach(p => html += `<th>${p}</th>`); html += `</tr>`;
            
            pArr.forEach(rowP => {
                html += `<tr><th>${rowP}</th>`;
                pArr.forEach(colP => {
                    if (rowP === colP) { html += `<td style="background:#111;">-</td>`; } 
                    else {
                        let r = matrix[rowP][colP];
                        html += r ? `<td><span style="color:#48bb78">${r.w}</span>-<span style="color:#f56565">${r.l}</span>-<span style="color:#a0aec0">${r.d}</span></td>` : `<td>0-0-0</td>`;
                    }
                });
                html += `</tr>`;
            });
            document.getElementById('modal-body-content').innerHTML = html + `</table></div>`;
        }

        // --- Custom Combobox Editing ---
        function openPlayerEdit(filename, w, b) {
            document.getElementById('edit-target-file').value = filename;
            document.getElementById('edit-w-input').value = w;
            document.getElementById('edit-b-input').value = b;
            document.getElementById('edit-player-overlay').style.display = 'flex';
        }
        function closePlayerEdit() { document.getElementById('edit-player-overlay').style.display = 'none'; }
        function submitPlayerEdit() {
            let f = document.getElementById('edit-target-file').value;
            let w = document.getElementById('edit-w-input').value;
            let b = document.getElementById('edit-b-input').value;
            if(!w || !b) return;
            fetch('/api/game/update', { method: 'POST', body: JSON.stringify({action:'edit_players', filename:f, white:w, black:b}) })
                .then(() => { closePlayerEdit(); openManager(); }); // Refresh cache and UI
        }

        function apiAction(action, filename) {
            let payload = { action, filename };
            if (action === 'delete' && !confirm(`Delete ${filename}?`)) return;
            if (action === 'rename') { let nn = prompt("New filename:"); if (!nn) return; payload.new_name = nn; }
            fetch('/api/game/update', { method: 'POST', body: JSON.stringify(payload) }).then(() => openManager());
        }

        document.addEventListener('keydown', (e) => {
            if (totalPlies === 0) return;
            let current = (currentViewPly === -1) ? totalPlies : currentViewPly;
            if (e.key === 'ArrowLeft' && current > 0) viewPly(current - 1);
            else if (e.key === 'ArrowRight' && current < totalPlies) viewPly(current + 1);
        });

        setInterval(fetchState, 1000); fetchState(); updateBoard();
    </script>
</body>
</html>
